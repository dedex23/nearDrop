appId: com.neardrop.app
---
# Full CRUD cycle: create, read, edit, delete a place
- launchApp:
    clearState: true
- runFlow: flows/dismiss-permissions.yaml

# Wait for app to fully load
- assertVisible: 'Carte'

# === CREATE ===
- tapOn: 'Lieux'
- waitForAnimationToEnd

# Recovery: expo-router race condition
- runFlow:
    when:
      notVisible:
        id: 'fab-add-place'
    commands:
      - stopApp
      - launchApp:
          clearState: true
      - runFlow: flows/dismiss-permissions.yaml
      - assertVisible: 'Carte'
      - tapOn: 'Lieux'
      - waitForAnimationToEnd

- tapOn:
    id: 'fab-add-place'

# Fill form
- tapOn:
    id: 'input-name'
- inputText: 'CrudCafe'
- hideKeyboard

- tapOn:
    id: 'input-address'
- inputText: '1 Rue de la Paix'
- hideKeyboard

- tapOn: 'Café'

# Scroll down to reach Notes and Submit
- swipe:
    direction: UP
    duration: 500

- tapOn:
    id: 'input-notes'
- inputText: 'Espresso'
- hideKeyboard

- tapOn:
    id: 'btn-submit-place'

# After submit, the app redirects to the Map tab
- waitForAnimationToEnd
- assertVisible:
    id: 'fab-add-place-map'

# === READ ===
# Navigate to Places tab to find the created place
- tapOn: 'Lieux'
- assertVisible: 'CrudCafe'

# Open the place detail
- tapOn: 'CrudCafe'

# Verify detail page content
- assertVisible: 'CrudCafe'
- assertVisible: 'Espresso'
- assertVisible: 'Source : manual'

# === EDIT ===
- tapOn:
    id: 'btn-edit-place'

# Clear existing name and type new one
- tapOn:
    id: 'input-name'
- eraseText: 8
- inputText: 'CrudBar'
- hideKeyboard

# Change category to Bar
- tapOn: 'Bar'

# Submit changes
- swipe:
    direction: UP
    duration: 500
- tapOn:
    id: 'btn-submit-place'

# After edit, we return to the detail view (setIsEditing(false))
- assertVisible: 'CrudBar'

# Verify updated name in detail view
- assertVisible: 'CrudBar'

# === DELETE ===
- swipe:
    direction: UP
    duration: 500
- tapOn:
    id: 'btn-delete-place'

# Confirm deletion in the Alert dialog
- tapOn: 'Supprimer'

# Back on Places list — the place should be gone
- assertNotVisible: 'CrudBar'
