appId: com.neardrop.app
---
# Test search and category filtering
- launchApp:
    clearState: true
- runFlow: flows/dismiss-permissions.yaml

# Wait for app to fully load
- assertVisible: 'Carte'

# === SETUP: Create two places with different categories ===

- tapOn: 'Lieux'

# Create first place: Restaurant
- tapOn:
    id: 'fab-add-place'
- tapOn:
    id: 'input-name'
- inputText: 'FiltResto'
- hideKeyboard
- tapOn:
    id: 'input-address'
- inputText: '5 Rue Oberkampf'
- hideKeyboard
- tapOn: 'Restaurant'
- tapOn:
    id: 'btn-submit-place'
- assertVisible: 'Lieux'

# Create second place: Bar
- tapOn: 'Lieux'
- tapOn:
    id: 'fab-add-place'
- tapOn:
    id: 'input-name'
- inputText: 'FiltBar'
- hideKeyboard
- tapOn:
    id: 'input-address'
- inputText: '20 Rue Oberkampf'
- hideKeyboard
- tapOn: 'Bar'
- tapOn:
    id: 'btn-submit-place'
- assertVisible: 'Lieux'

# Go to Places list
- tapOn: 'Lieux'

# Both places should be visible
- assertVisible: 'FiltResto'
- assertVisible: 'FiltBar'

# === SEARCH ===
- tapOn:
    id: 'searchbar'
- inputText: 'Resto'
- assertVisible: 'FiltResto'
- assertNotVisible: 'FiltBar'

# Clear search
- eraseText: 5

# === CATEGORY FILTER ===
- hideKeyboard
- tapOn: 'Bar'
- assertVisible: 'FiltBar'
- assertNotVisible: 'FiltResto'

# Deselect filter to show all
- tapOn: 'Bar'
- assertVisible: 'FiltResto'
- assertVisible: 'FiltBar'
