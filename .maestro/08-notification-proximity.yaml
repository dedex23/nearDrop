appId: com.neardrop.app
---
# Test notification proximity: enable tracking, add a place, mock GPS near it
# Note: this flow is best-effort — notification timing depends on emulator
- launchApp:
    clearState: true
- runFlow: flows/dismiss-permissions.yaml

# Wait for app to fully load
- assertVisible:
    text: "Carte"
    enabled: true

# Enable tracking in settings
- tapOn: "Paramètres"
- assertVisible: "Suivi en arrière-plan"
- tapOn:
    id: "switch-tracking"

# Navigate to Places and add a place
- tapOn: "Lieux"
- tapOn:
    id: "fab-add-place"

# Fill in place details
- tapOn:
    id: "input-name"
- inputText: "Test Notif Place"
- hideKeyboard

- tapOn:
    id: "input-address"
- inputText: "Tour Eiffel, Paris"
- hideKeyboard

# Select Restaurant category
- tapOn: "Restaurant"

# Submit the place
- tapOn:
    id: "btn-submit-place"

# Wait for geocoding and navigation back
- waitForAnimationToEnd

# Verify the place was created
- tapOn: "Lieux"
- assertVisible: "Test Notif Place"
