appId: com.neardrop.app
---
# Test Settings screen visibility and toggle interactions
- launchApp:
    clearState: true
- runFlow: flows/dismiss-permissions.yaml

# Wait for app to fully load
- assertVisible:
    text: "Carte"
    enabled: true

# Navigate to Settings
- tapOn: "Paramètres"

# Verify settings sections are visible
- assertVisible: "Suivi en arrière-plan"
- assertVisible: "Mode silencieux"
- assertVisible: "Paramètres de notification"

# Toggle Quiet Mode on
- tapOn:
    id: "switch-quiet-mode"

# Scroll to see more settings — need more swipes now with new sections
- scrollUntilVisible:
    element: "Heures actives"
    direction: DOWN

# Scroll further for categories and appearance sections
- swipe:
    direction: UP
    duration: 500

- scrollUntilVisible:
    element: "Exporter les données"
    direction: DOWN

- assertVisible: "Exporter les données"

# Scroll to About
- scrollUntilVisible:
    element: "NearDrop"
    direction: DOWN

- assertVisible: "NearDrop"

# Scroll back up and toggle Quiet Mode off
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500
- swipe:
    direction: DOWN
    duration: 500

- tapOn:
    id: "switch-quiet-mode"
