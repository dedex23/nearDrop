appId: com.neardrop.app
---
# Verify NearDrop launches without crash and displays the Map screen
- launchApp:
    clearState: true
- runFlow: flows/dismiss-permissions.yaml

# Assert the Map tab is visible
- extendedWaitUntil:
    visible: "Carte"
    timeout: 15000
- assertVisible:
    text: "lieux"

# Verify bottom tab bar is present
- assertVisible: "Lieux"
- assertVisible: "Paramètres"
