appId: com.neardrop.app
---
# Test navigation between all three tabs
- launchApp:
    clearState: true
- runFlow: flows/dismiss-permissions.yaml

# Start on Map tab — wait for it to load
- assertVisible:
    text: "Carte"
    enabled: true

# Navigate to Places tab
- tapOn: "Lieux"
- waitForAnimationToEnd

# Recovery: expo-router useLinking race condition can break navigation.
# If Places tab content isn't visible, restart the app and retry.
- runFlow:
    when:
      notVisible:
        id: "searchbar"
    commands:
      - stopApp
      - launchApp:
          clearState: true
      - runFlow: flows/dismiss-permissions.yaml
      - assertVisible:
          text: "Carte"
          enabled: true
      - tapOn: "Lieux"
      - waitForAnimationToEnd

- assertVisible:
    id: "searchbar"

# Navigate to Settings tab
- tapOn:
    text: "Paramètres"
    retryTapIfNoChange: true
- assertVisible: "Suivi en arrière-plan"

# Navigate back to Map tab
- tapOn:
    text: "Carte"
    retryTapIfNoChange: true
- assertVisible:
    id: "fab-add-place-map"
