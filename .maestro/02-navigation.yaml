appId: com.neardrop.app
---
# Test navigation between all three tabs
- launchApp:
    clearState: true
- runFlow: flows/dismiss-permissions.yaml

# Start on Map tab
- extendedWaitUntil:
    visible: "Carte"
    timeout: 15000

# Navigate to Places tab
- tapOn: "Lieux"
- waitForAnimationToEnd

# Recovery: expo-router useLinking race condition can break navigation.
# If Places tab content isn't visible, restart the app and retry.
- runFlow:
    when:
      notVisible:
        id: "searchbar"
    commands:
      - stopApp
      - launchApp:
          clearState: true
      - runFlow: flows/dismiss-permissions.yaml
      - extendedWaitUntil:
          visible: "Carte"
          timeout: 15000
      - tapOn: "Lieux"

- extendedWaitUntil:
    visible:
      id: "searchbar"
    timeout: 15000

# Navigate to Settings tab
- tapOn:
    text: "Paramètres"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible: "Suivi en arrière-plan"
    timeout: 10000

# Navigate back to Map tab
- tapOn:
    text: "Carte"
    retryTapIfNoChange: true
- extendedWaitUntil:
    visible:
      id: "fab-add-place-map"
    timeout: 10000
