appId: com.neardrop.app
---
# Test adding a new place — fills all required fields and submits
- launchApp:
    clearState: true
- runFlow: flows/dismiss-permissions.yaml

# Wait for app to fully load
- assertVisible: 'Carte'

# Navigate to Places tab
- tapOn: 'Lieux'
- waitForAnimationToEnd

# Recovery: expo-router useLinking race condition can break navigation.
- runFlow:
    when:
      notVisible:
        id: 'fab-add-place'
    commands:
      - stopApp
      - launchApp:
          clearState: true
      - runFlow: flows/dismiss-permissions.yaml
      - assertVisible: 'Carte'
      - tapOn: 'Lieux'

- assertVisible:
    id: 'fab-add-place'

# Tap FAB to open the Add Place form
- tapOn:
    id: 'fab-add-place'

# Verify form is visible
- assertVisible: 'Ajouter un lieu'

# Fill in Name
- tapOn:
    id: 'input-name'
- inputText: 'Bistro'
- hideKeyboard

# Fill in Address
- tapOn:
    id: 'input-address'
- inputText: '10 rue de Rivoli'
- hideKeyboard

# Select category Restaurant
- tapOn: 'Restaurant'

# Submit the form
- tapOn:
    id: 'btn-submit-place'

# Wait for geocoding + navigation back (Nominatim can be slow)
- assertVisible: 'Lieux'

# Navigate to Places tab to see the new place
- tapOn: 'Lieux'

# Assert the place appears in the list
- assertVisible: 'Bistro'
